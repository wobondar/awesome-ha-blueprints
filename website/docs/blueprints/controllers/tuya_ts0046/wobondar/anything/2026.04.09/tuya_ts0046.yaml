        sequence:
          - choose:
              - conditions: []
                sequence: !input button_2_hold
      #
      # Actions for Button 3 Single Press
      - conditions:
          - condition: trigger
            id:
              - z2m-button-3-single
        sequence:
          - choose:
              - conditions: []
                sequence: !input button_3_single
      #
      # Actions for Button 3 Double Press
      - conditions:
          - condition: trigger
            id:
              - z2m-button-3-double
        sequence:
          - choose:
              - conditions: []
                sequence: !input button_3_double
      #
      # Actions for Button 3 Hold
      - conditions:
          - condition: trigger
            id:
              - z2m-button-3-hold
        sequence:
          - choose:
              - conditions: []
                sequence: !input button_3_hold
      #
      # Actions for Button 4 Single Press
      - conditions:
          - condition: trigger
            id:
              - z2m-button-4-single
        sequence:
          - choose:
              - conditions: []
                sequence: !input button_4_single
      #
      # Actions for Button 4 Double Press
      - conditions:
          - condition: trigger
            id:
              - z2m-button-4-double
        sequence:
          - choose:
              - conditions: []
                sequence: !input button_4_double
      #
      # Actions for Button 4 Hold
      - conditions:
          - condition: trigger
            id:
              - z2m-button-4-hold
        sequence:
          - choose:
              - conditions: []
                sequence: !input button_4_hold
      #
      # Actions for Button 5 Single Press
      - conditions:
          - condition: trigger
            id:
              - z2m-button-5-single
        sequence:
          - choose:
              - conditions: []
                sequence: !input button_5_single
      #
      # Actions for Button 5 Double Press
      - conditions:
          - condition: trigger
            id:
              - z2m-button-5-double
        sequence:
          - choose:
              - conditions: []
                sequence: !input button_5_double
      #
      # Actions for Button 5 Hold
      - conditions:
          - condition: trigger
